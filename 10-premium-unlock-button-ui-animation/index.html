    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Unlock Button UI Animation</title>

<style>

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0f0f1a, #050508);
}

/* BUTTON */
.btn {
    position: relative;
    padding: 18px 70px;
    font-size: 22px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ffffffcc;
    border-radius: 50px;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.2s ease;

    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);

    box-shadow:inset        0 0 20px rgba(122,92,255,0.2),
        inset 0 0 15px rgba(122,92,255,0.1);
}

/* TEXT */
.btn span {
    position: relative;
    z-index: 3;
}

/* ROTATING BORDER */
.btn::before {
    content: "";
    position: absolute;
    width: 300%;
    height: 300%;
    top: -100%;
    left: -100%;
    background: conic-gradient(
        #7a5cff,
        #00e0ff,
        #7a5cff,
        transparent 30%
    );
    opacity: 0;
}

/* INNER */
.btn::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: rgba(5,5,8,0.95);
    border-radius: 50px;
    z-index: 1;
}

/* SHINE */
.shine {
    position: absolute;
    width: 40%;
    height: 100%;
    top: 0;
    left: -50%;
    background: linear-gradient(        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
    );
    transform: skewX(-20deg);
    z-index: 2;
}

/* RIPPLE */
.ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(122,92,255,0.6);
    transform: scale(0);
    animation: rippleAnim 0.6s linear;
    pointer-events: none;
}

/* HOVER */
.btn:hover::before {
    opacity: 1;
    animation: rotate 3s linear infinite;
}

.btn:hover .shine {
    animation: shineMove 1s ease forwards;
}

.btn:hover {
    box-shadow:inset        0 0 40px rgba(122,92,255,0.6),
        0 0 80px rgba(0,224,255,0.3),
        inset 0 0 20px rgba(255,255,255,0.1);
}

/* CLICK PRESS */
.btn:active {
    transform: scale(0.95);
}

/* ANIMATIONS */
@keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes shineMove {
    0% { left: -50%; }
    100% { left: 120%; }
}

@keyframes rippleAnim {
    to {
        transform: scale(4);
        opacity: 0;
    }
}

</style>

</head>
<body>

<button class="btn" id="btn">
    <div class="shine"></div>
    <span>UNLOCK</span>
</button>

<script>
const btn = document.getElementById("btn");

/* RIPPLE EFFECT */
btn.addEventListener("click", function(e) {
    const circle = document.createElement("span");
    circle.classList.add("ripple");

    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);

    circle.style.width = circle.style.height = size + "px";
    circle.style.left = e.clientX - rect.left - size / 2 + "px";
    circle.style.top = e.clientY - rect.top - size / 2 + "px";

    btn.appendChild(circle);

    setTimeout(() => {
        circle.remove();
    }, 600);
});

/* MAGNETIC EFFECT */
btn.addEventListener("mousemove", (e) => {
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width / 2;
    const y = e.clientY - rect.top - rect.height / 2;

    btn.style.transform = `translate(${x * 0.2}px, ${y * 0.2}px)`;
});

btn.addEventListener("mouseleave", () => {
    btn.style.transform = "translate(0,0)";
});
</script>

</body>
</html>
