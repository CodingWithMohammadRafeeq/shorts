<!--   width: 18px; <!DOCTYPE html> -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Perfect Save Button</title>

<style>
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f1f5f9;
  font-family: -apple-system, sans-serif;
}

/* BUTTON */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 34px;
  border-radius: 50px;
  border: 1px solid rgba(0,0,0,0.05);
  cursor: pointer;
  font-size: 16px;
  color: #374151;

  background: linear-gradient(145deg, #ffffff, #f3f4f6);

  box-shadow:inset    8px 8px 20px rgba(0,0,0,0.08),
    -8px -8px 20px rgba(255,255,255,0.9);

  transition: all 0.3s ease;
}

/* ICON */
.icon {
  width: 0;
  height: 28px;
  border-radius: 50%;
  margin-right: 0;
  overflow: hidden;

  display: flex;
  align-items: center;
  justify-content: center;

  background: #ffffff;
  box-shadow:inset    inset 2px 2px 6px rgba(0,0,0,0.1),
    inset -2px -2px 6px rgba(255,255,255,0.8);

  transition: all 0.35s ease;
}

.btn.active .icon {
  width: 28px;
  margin-right: 10px;
}

/* LOADER */
.loader {
  width: 18px;
  height: 18px;
  position: relative;
  display: none;
}

.loader div {
  position: absolute;
  width: 2.5px;
  height: 6px;
  background: #6366f1;
  border-radius: 3px;
  top: 0;
  left: 50%;
  transform-origin: center 9px;
  opacity: 0.2;
  animation: fadeSpin 1.2s linear infinite;
}

/* 12 bars */
.loader div:nth-child(1){transform: rotate(0deg) translateX(-50%);animation-delay:0s;}
.loader div:nth-child(2){transform: rotate(30deg) translateX(-50%);animation-delay:0.1s;}
.loader div:nth-child(3){transform: rotate(60deg) translateX(-50%);animation-delay:0.2s;}
.loader div:nth-child(4){transform: rotate(90deg) translateX(-50%);animation-delay:0.3s;}
.loader div:nth-child(5){transform: rotate(120deg) translateX(-50%);animation-delay:0.4s;}
.loader div:nth-child(6){transform: rotate(150deg) translateX(-50%);animation-delay:0.5s;}
.loader div:nth-child(7){transform: rotate(180deg) translateX(-50%);animation-delay:0.6s;}
.loader div:nth-child(8){transform: rotate(210deg) translateX(-50%);animation-delay:0.7s;}
.loader div:nth-child(9){transform: rotate(240deg) translateX(-50%);animation-delay:0.8s;}
.loader div:nth-child(10){transform: rotate(270deg) translateX(-50%);animation-delay:0.9s;}
.loader div:nth-child(11){transform: rotate(300deg) translateX(-50%);animation-delay:1s;}
.loader div:nth-child(12){transform: rotate(330deg) translateX(-50%);animation-delay:1.1s;}

@keyframes fadeSpin {
  0% { opacity: 1; }
  100% { opacity: 0.2; }
}

/* CHECK */
.check {
  display: none;
}

/* STATES */
.btn.saving .loader {
  display: block;
}

.btn.saved {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
}

/*  IMPORTANT FIX HERE */
.btn.saved .icon {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  box-shadow: none;
}

/* SHOW CHECK */
.btn.saved .check {
  display: flex;
}

/* HIDE LOADER */
.btn.saved .loader {
  display: none;
}

/* TEXT */
.text {
  transition: 0.25s ease;
}

.fade {
  opacity: 0;
}



</style>
</head>

<body>

<button class="btn" id="btn">
  <div class="icon">

    <div class="loader">
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div>
    </div>

    <div class="check">
      <svg width="16" height="16" viewBox="0 0 24 24">
        <path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

  </div>

  <span class="text">Save</span>
</button>

<script>
const btn = document.getElementById("btn");
const text = btn.querySelector(".text");

btn.addEventListener("click", () => {

  if (btn.classList.contains("saving")) return;

  btn.classList.add("active", "saving");

  text.classList.add("fade");
  setTimeout(() => {
    text.textContent = "Saving";
    text.classList.remove("fade");
  }, 150);

  setTimeout(() => {

    btn.classList.remove("saving");
    btn.classList.add("saved");

    text.classList.add("fade");
    setTimeout(() => {
      text.textContent = "Saved";
      text.classList.remove("fade");
    }, 150);

    setTimeout(() => {

      btn.classList.remove("saved", "active");

      text.classList.add("fade");
      setTimeout(() => {
        text.textContent = "Save";
        text.classList.remove("fade");
      }, 150);

    }, 2000);

  }, 1800);

});
</script>

</body>
</html>
