<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Orbit Fixed</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050816;
    font-family:sans-serif;
}

/* ===== BUTTON (FIXED PREMIUM) ===== */
.btn{
    position:relative;
    width:180px;
    height:55px;

    /* CLEAN PREMIUM GRADIENT */
    background:linear-gradient(135deg,#6c63ff,#7b6fff,#5de0ff);

    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:16px;
    cursor:pointer;

    /* IMPORTANT FIX */
    overflow:visible;

    transition:all 0.45s ease;

    box-shadow:
        0 8px 20px rgba(108,99,255,0.4),
        0 0 15px rgba(93,224,255,0.3);
}

.btn:hover{
    transform:translateY(-2px);
}

/* TEXT */
.text{
    transition:opacity 0.3s ease;
}

/* MORPH */
.btn.active{
    width:70px;
    height:70px;
    border-radius:50%;
}

.btn.active .text{
    opacity:0;
}

/* ===== ORBIT ===== */
.orbit{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
}

.dot{
    width:10px;
    height:10px;
    background:#fff;
    border-radius:50%;
    transform:translateX(45px);
    opacity:0;
}

.btn.active .dot{
    opacity:1;
}

/* ===== CHECK ===== */
.check{
    position:absolute;
    font-size:22px;
    opacity:0;
    transform:scale(0);
    color:#00ffcc;
    text-shadow:0 0 0px #00ffcc;
}

/* RING */
.ring{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    border:2px solid #00ffcc;
    opacity:0;
    transform:scale(0.5);
}

/* ===== ANIMATION ===== */

.btn.active .orbit{
    animation:rotateOrbit 2.4s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}

.btn.active .dot{
    animation:mergeDot 2.4s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}

.btn.success .check{
    opacity:1;
    animation:popGlow 0.5s ease forwards, pulse 1.2s ease infinite 0.5s;
}

.btn.success .ring{
    animation:ringWave 1s ease-out forwards;
}

/* ===== KEYFRAMES ===== */

@keyframes rotateOrbit{
    0%{ transform:rotate(0deg); }
    80%{ transform:rotate(720deg); }
    100%{ transform:rotate(720deg); }
}

@keyframes mergeDot{
    0%{
        transform:translateX(45px) scale(1);
        opacity:1;
    }
    80%{
        transform:translateX(45px) scale(1);
        opacity:1;
    }
    100%{
        transform:translateX(0px) scale(0);
        opacity:0;
    }
}

@keyframes popGlow{
    0%{
        transform:scale(0);
        text-shadow:0 0 0px #00ffcc;
    }
    50%{
        transform:scale(1.2);
        text-shadow:
            0 0 10px #00ffcc,
            0 0 20px #00ffcc,
            0 0 30px #00ffcc;
    }
    100%{
        transform:scale(1);
        text-shadow:
            0 0 8px #00ffcc,
            0 0 16px #00ffcc;
    }
}

@keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.1); }
}

@keyframes ringWave{
    0%{
        opacity:0.8;
        transform:scale(0.6);
    }
    100%{
        opacity:0;
        transform:scale(1.6);
    }
}
</style>
</head>

<body>

<div class="btn" id="btn">
    <span class="text">Submit</span>

    <div class="orbit">
        <div class="dot"></div>
    </div>

    <div class="check">✔</div>
    <div class="ring"></div>
</div>

<script>
const btn = document.getElementById("btn");

btn.addEventListener("click", () => {

    if(btn.classList.contains("active")) return;

    btn.classList.add("active");

    setTimeout(()=>{
        btn.classList.add("success");
    },2400);

    setTimeout(()=>{
        btn.classList.remove("active","success");
    },4000);

});
</script>

</body>
</html>
