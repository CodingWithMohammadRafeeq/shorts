<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delivery Animation</title>

<style>

    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(#8ed7ff,#eaf7ff);
        font-family:sans-serif;
    }

    .container{
        width:420px;
        text-align:center;
    }

    button{
        padding:10px 24px;
        font-size:14px;
        border:none;
        border-radius:6px;
        background:#111;
        color:white;
        cursor:pointer;
    }

    /* STAGE */

    .stage{
        margin-top:16px;
        height:180px;
        position:relative;
        overflow:hidden;
        background:linear-gradient(#87ceeb,#dff3ff);
        border-radius:10px;
        display:none;
    }

    /* CLOUDS */

    .clouds{
        position:absolute;
        top:20px;
        width:200%;
        display:flex;
        gap:80px;
        animation:cloudMove 60s linear infinite;
    }

    .cloud{
        width:60px;
        height:24px;
        background:white;
        border-radius:40px;
        position:relative;
    }

    .cloud:before{
        content:"";
        position:absolute;
        width:26px;
        height:26px;
        background:white;
        border-radius:50%;
        left:6px;
        top:-12px;
    }

    .cloud:after{
        content:"";
        position:absolute;
        width:30px;
        height:24px;
        background:white;
        border-radius:50%;
        right:6px;
        top:-8px;
    }

    @keyframes cloudMove{
        from{transform:translateX(0)}
        to{transform:translateX(-50%)}
    }

    /* MOUNTAINS */

    .mountains{
        position:absolute;
        bottom:100px;
        width:200%;
        height:50px;
        background:linear-gradient(#7fb3ff,#4a86d8);
        clip-path:polygon(
            0% 100%,10% 60%,20% 100%,30% 50%,40% 100%,
            50% 65%,60% 100%,70% 60%,80% 100%,90% 55%,100% 100%
        );
        animation:mountMove 30s linear infinite;
    }

    @keyframes mountMove{
        from{transform:translateX(0)}
        to{transform:translateX(-50%)}
    }

    /* TREES */

    .trees{
        position:absolute;
        bottom:70px;
        width:200%;
        display:flex;
        gap:40px;
        animation:treeMove 12s linear infinite;
    }

    .tree{
        width:4px;
        height:28px;
        background:#6b4f2a;
        position:relative;
    }


    .tree:before{
        content:"";
        position:absolute;
        width:20px;
        height:16px;
        background:#2e7d32;
        border-radius:50%;
        left:-8px;
        top:-12px;
    }

    .tree:after{
        content:"";
        position:absolute;
        width:16px;
        height:12px;
        background:#388e3c;
        border-radius:50%;
        left:-6px;
        top:-18px;
    }

    @keyframes treeMove{
        from{transform:translateX(0)}
        to{transform:translateX(-50%)}
    }

    /* GRASS */

    .grass{
        position:absolute;
        bottom:50px;
        width:200%;
        height:14px;
        background:#4caf50;
        animation:treeMove 12s linear infinite;
    }

    /* ROAD */

    .road{
        position:absolute;
        bottom:28px;
        width:300%;
        height:10px;
        background:#333;
        animation:roadMove 1s linear infinite;
    }

    .road:after{
        content:"";
        position:absolute;
        top:4px;
        width:300%;
        height:2px;
        background:repeating-linear-gradient(90deg,
        white 0,
        white 24px,
        transparent 24px,
        transparent 48px
        );
    }
    
    @keyframes roadMove{
        from{transform:translateX(0)}
        to{transform:translateX(-50%)}
    }
    
    /* PACKAGES */
    
    .package{
        width: 16px;height:16px;
        background:#d39a2c;
        position:absolute;
        bottom:46px;
        border-radius:3px;
    }
    
    #p1{left:200px;}
    #p2{left:230px;}
    #p3{left:260px;}
    
    @keyframes load{
        0%{transform:translate(0,0)}
        40%{transform:translate(-70px,-55px)}
        70%{transform:translate(-95px,-30px)}
        100%{transform:translate(-110px,-30px);opacity:0}
    }
    
    /* TRUCK */
    
    .truck{
        position:absolute;
        left:-150px;
        bottom:46px;
        width:150px;
        height:60px;
    }
    
    .cargo{
        width:80px;
        height:40px;
        background:#ff9800;
        position:absolute;
        left:0;
        top:16px;
        border-radius:4px;
    }


    .cabin{
        width:50px;
        height:40px;
        background:#1e88e5;
        position:absolute;
        right:0;
        top:16px;
        border-radius:4px;
    }

    .window{
        width:16px;
        height:10px;
        background:#bbdefb;
        position:absolute;
        top:12px;
        right:12px;
        border-radius:2px;
    }

    /* WHEELS */

    .wheel{
        width:16px;
        height:16px;
        background:#111;
        border-radius:50%;
        position:absolute;
        bottom:-6px;
        animation:spin .35s linear infinite;
    }

    .w1{left:34px;}
    .w2{left:92px;}
    .w3{left:124px;}

    @keyframes spin{
        from{transform:rotate(0)}
        to{transform:rotate(360deg)}
    }

    @keyframes drive{
        from{left:-150px}
        to{left:520px}
    }

    /* LOADED */

    .loaded{
        width:10px;
        height:10px;
        background:#c88a1c;
        position:absolute;
        border-radius:2px;
        opacity:0;
    }

    #l1{left:6px;bottom:4px;}
    #l2{left:22px;bottom:4px;}
    #l3{left:38px;bottom:4px;}

    .success{
        display:none;
        margin-top:16px;
        font-size:18px;
        color:#2e7d32;
        font-weight:bold;
    }





</style>
</head>

<body>

    <div class="container">

        <button id="orderBtn">Place Order</button>

        <div class="stage" id="stage">

            <div class="clouds">
                <div class="cloud"></div>
                <div class="cloud"></div>
                <div class="cloud"></div>
            </div>

            <div class="mountains"></div>

            <div class="trees">
                <div class="tree"></div>
                <div class="tree"></div>
                <div class="tree"></div>
            </div>

            <div class="grass"></div>

            <div class="package" id="p1"></div>
            <div class="package" id="p2"></div>
            <div class="package" id="p3"></div>

            <div class="truck" id="truck">

                <div class="cargo">
                    <div class="loaded" id="l1"></div>
                    <div class="loaded" id="l2"></div>
                    <div class="loaded" id="l3"></div>
                </div>

                <div class="cabin">
                    <div class="window"></div>
                </div>

                <div class="wheel w1"></div>
                <div class="wheel w2"></div>
                <div class="wheel w3"></div>

            </div>

            <div class="road"></div>

        </div>

        <div class="success" id="success">
             Order Shipped
        </div>

    </div>




<script>

    let btn=document.getElementById("orderBtn")
    let stage=document.getElementById("stage")
    let truck=document.getElementById("truck")

    let p1=document.getElementById("p1")
    let p2=document.getElementById("p2")
    let p3=document.getElementById("p3")

    let l1=document.getElementById("l1")
    let l2=document.getElementById("l2")
    let l3=document.getElementById("l3")

    let success=document.getElementById("success")

    btn.onclick=function(){

        btn.style.display="none"
        stage.style.display="block"

        truck.style.animation="drive 7s linear forwards"

        setTimeout(()=>{p1.style.animation="load 1s forwards"},1000)
        setTimeout(()=>{l1.style.opacity="1"},1700)

        setTimeout(()=>{p2.style.animation="load 1s forwards"},1700)
        setTimeout(()=>{l2.style.opacity="1"},2400)

        setTimeout(()=>{p3.style.animation="load 1s forwards"},2400)
        setTimeout(()=>{l3.style.opacity="1"},3100)

        setTimeout(()=>{
            stage.style.display="none"
            success.style.display="block"
        },7000)

    }


    

</script>

</body>
</html>
