<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Social Buttons</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
    
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#e9e9e9;
    font-family:sans-serif;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(10px, 2vw, 40px);
    width:90%;
    max-width:900px;
    perspective:1200px;
}

/* LINK RESET */
.card-link{
    text-decoration:none;
    color:inherit;
}

/* CARD */
.card{
    width:100%;
    aspect-ratio:3/1;
    background:#fff;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;

    position:relative;
    cursor:pointer;

    transform: rotateX(55deg) rotateZ(-30deg);
    transform-style: preserve-3d;

    transition:0.35s ease;

    box-shadow: 0 25px 30px rgba(0,0,0,0.25);
}

/* LEFT FACE */
.card::before{
    content:'';
    position:absolute;
    top:0;
    left:-10px;
    width:10px;
    height:100%;
    background:#dcdcdc;

    transform-origin:right;
    transform: skewY(-45deg);
}

/* BOTTOM FACE */
.card::after{
    content:'';
    position:absolute;
    bottom:-10px;
    left:0;
    width:100%;
    height:10px;
    background:#cfcfcf;

    transform-origin:top;
    transform: skewX(-45deg);
}

/* HOVER */
.card:hover{
    transform: rotateX(55deg) rotateZ(-30deg) translateY(-25px);
    box-shadow: 0 45px 45px rgba(0,0,0,0.35);
}

/* TEXT */
.card i{
    font-size:clamp(14px, 2vw, 20px);
}
.card span{
    font-size:clamp(12px, 1.5vw, 15px);
}

/* COLORS */

/* YouTube */
.youtube:hover{
    background:#ff0000;
    color:#fff;
}
.youtube:hover::before{ background:#cc0000; }
.youtube:hover::after{ background:#b30000; }

/* Telegram */
.telegram:hover{
    background:#0088cc;
    color:#fff;
}
.telegram:hover::before{ background:#006699; }
.telegram:hover::after{ background:#00557a; }

/* WhatsApp */
.whatsapp:hover{
    background:#25d366;
    color:#fff;
}
.whatsapp:hover::before{ background:#1da851; }
.whatsapp:hover::after{ background:#189944; }

/* Facebook */
.facebook:hover{
    background:#1877f2;
    color:#fff;
}
.facebook:hover::before{ background:#145dbf; }
.facebook:hover::after{ background:#0f4aa3; }

@media (max-width:600px){
    .container{
        gap:10px;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- YouTube -->
    <a href="https://youtube.com/@yourchannel" target="_blank" class="card-link">
        <div class="card youtube">
            <i class="fab fa-youtube"></i>
            <span>YouTube</span>
        </div>
    </a>

    <!-- Telegram -->
    <a href="https://t.me/yourchannel" target="_blank" class="card-link">
        <div class="card telegram">
            <i class="fab fa-telegram"></i>
            <span>Telegram</span>
        </div>
    </a>

    <!-- WhatsApp -->
    <a href="https://wa.me/919999999999" target="_blank" class="card-link">
        <div class="card whatsapp">
            <i class="fab fa-whatsapp"></i>
            <span>WhatsApp</span>
        </div>
    </a>

    <!-- Facebook -->
    <a href="https://facebook.com/yourpage" target="_blank" class="card-link">
        <div class="card facebook">
            <i class="fab fa-facebook-f"></i>
            <span>Facebook</span>
        </div>
    </a>

</div>

</body>
</html>
