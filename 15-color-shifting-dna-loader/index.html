<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Shifting DNA Loader</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #020617, #000);
}

/* Container */
.dna {
  display: flex;
  gap: 16px;
}

/* Dot */
.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  animation: dnaWave 1.5s infinite ease-in-out,
             colorShift 3s infinite linear;
}

/* Delay for helix */
.dot:nth-child(1) { animation-delay: 0s, 0s; }
.dot:nth-child(2) { animation-delay: 0.1s, 0.2s; }
.dot:nth-child(3) { animation-delay: 0.2s, 0.4s; }
.dot:nth-child(4) { animation-delay: 0.3s, 0.6s; }
.dot:nth-child(5) { animation-delay: 0.4s, 0.8s; }
.dot:nth-child(6) { animation-delay: 0.5s, 1s; }
.dot:nth-child(7) { animation-delay: 0.6s, 1.2s; }
.dot:nth-child(8) { animation-delay: 0.7s, 1.4s; }

/* DNA wave motion */
@keyframes dnaWave {
  0%, 100% {
    transform: translateY(0) scale(1);
  }
  50% {
    transform: translateY(-35px) scale(1.4);
  }
}

/* Color shifting */
@keyframes colorShift {
  0% {
    background: #ff00cc;
    box-shadow: 0 0 12px #ff00cc;
  }
  25% {
    background: #00f5ff;
    box-shadow: 0 0 12px #00f5ff;
  }
  50% {
    background: #00ff94;
    box-shadow: 0 0 12px #00ff94;
  }
  75% {
    background: #ffe600;
    box-shadow: 0 0 12px #ffe600;
  }
  100% {
    background: #ff3d00;
    box-shadow: 0 0 12px #ff3d00;
  }
}



</style>

</head>
<body>

<div class="dna">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

</body>
</html>
