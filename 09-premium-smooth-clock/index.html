<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Smooth Clock</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0e0e0e;
    transition: 0.4s;
    overflow: hidden;
}

/* LIGHT MODE */
body.light {
    background: #f4f6f9;
}

/* CURSOR GLOW */
.cursor-glow {
    position: fixed;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(0,255,255,0.15), transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: 0.08s linear;
}

/* CLOCK */
.clock {
    position: relative;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* SUBTLE RING */
.clock::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: linear-gradient(120deg, transparent, rgba(0,255,255,0.3), transparent);
    opacity: 0.5;
}

/* NUMBERS */
.number {
    position: absolute;
    color: #ddd;
    font-size: 14px;
    transform: translate(-50%, -50%);
}

body.light .number {
    color: #333;
}

/* HANDS */
.hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    transform: translateX(-50%);
}

.hour {
    width: 5px;
    height: 60px;
    background: #fff;
}

.minute {
    width: 3px;
    height: 85px;
    background: #00cfff;
}

.second {
    width: 2px;
    height: 95px;
    background: #ff4d4d;
}

/* CENTER DOT */
.center {
    width: 10px;
    height: 10px;
    background: radial-gradient(circle, #00cfff, white);
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* DIGITAL */
.digital {
    margin-top: 15px;
    color: #eee;
    font-size: 18px;
    text-align: center;
}

body.light .digital {
    color: #111;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    background: #00cfff;
    cursor: pointer;
    font-weight: 600;
}

button:hover {
    opacity: 0.8;
}

.container {
    text-align: center;
}

</style>
</head>

<body>

<div class="cursor-glow" id="glow"></div>

<div class="container">

    <div class="clock" id="clock">
        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>
        <div class="center"></div>
    </div>

    <div class="digital" id="digital"></div>
    <button onclick="toggleMode()">Toggle Mode</button>

</div>

<script>

const clock = document.getElementById("clock");

/* NUMBERS */
for (let i = 1; i <= 12; i++) {
    let num = document.createElement("div");
    num.className = "number";
    num.innerText = i;

    let angle = i * 30 * Math.PI / 180;
    let x = 130 + Math.sin(angle) * 105;
    let y = 130 - Math.cos(angle) * 105;

    num.style.left = x + "px";
    num.style.top = y + "px";

    clock.appendChild(num);
}

/* CLOCK LOGIC */
function updateClock() {
    const now = new Date();

    const ms = now.getMilliseconds();
    const s = now.getSeconds() + ms / 1000;
    const m = now.getMinutes() + s / 60;
    const h = now.getHours() % 12 + m / 60;

    hour.style.transform = `translateX(-50%) rotate(${h * 30}deg)`;
    minute.style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
    second.style.transform = `translateX(-50%) rotate(${s * 6}deg)`;

    digital.innerText =
        now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    requestAnimationFrame(updateClock);
}
updateClock();

/* CURSOR GLOW */
const glow = document.getElementById("glow");

document.addEventListener("mousemove", e => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});

/* MODE */
function toggleMode() {
    document.body.classList.toggle("light");
}

</script>

</body>
</html>
