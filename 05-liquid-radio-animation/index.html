<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Liquid Radio Animation</title>

<style>

    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#f3f3f3;
        font-family:sans-serif;
    }

    .wrapper{
        position:relative;
        display:flex;
        flex-direction:column;
        gap:60px;
    }

    .option{
        display:flex;
        align-items:center;
        gap:15px;
        cursor:pointer;
        font-size:22px;
    }

    .circle{
        width:36px;
        height:36px;
        border:4px solid #111;
        border-radius:50%;
        position:relative;
    }

    .circle.active{
        border-color:#00d4ff;
    }

    .circle.active::after{
        content:"";
        width:16px;
        height:16px;
        background:#00d4ff;
        border-radius:50%;
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
    }

    /* liquid */

    .liquid{
        position:absolute;
        width:28px;
        height:28px;
        background:linear-gradient(135deg,#00d4ff,#7c5cff);
        border-radius:40px;
        opacity:0;
        left:-90px;
        top:0;
    }


    

</style>
</head>

<body>

<div class="wrapper">

<div class="option">
<div class="circle"></div>
<span>1</span>
</div>

<div class="option">
<div class="circle"></div>
<span>2</span>
</div>

<div class="option">
<div class="circle active"></div>
<span>3</span>
</div>

<div class="liquid"></div>

</div>

<script>

const circles=document.querySelectorAll(".circle")
const liquid=document.querySelector(".liquid")
const wrap=document.querySelector(".wrapper")

function center(el){

const r=el.getBoundingClientRect()
const p=wrap.getBoundingClientRect()

return{
x:r.left-p.left+r.width/2,
y:r.top-p.top+r.height/2
}

}

function animate(start,end,callback){

let startTime=null
const duration=650

function frame(time){

if(!startTime) startTime=time

let progress=(time-startTime)/duration
if(progress>1) progress=1

let t=progress

let curve=130*Math.sin(t*Math.PI)

let x=start.x-curve
let y=start.y+(end.y-start.y)*t

liquid.style.left=(x-14)+"px"
liquid.style.top=(y-14)+"px"

let stretch=Math.sin(t*Math.PI)

liquid.style.height=(28+stretch*30)+"px"
liquid.style.width=(28-stretch*6)+"px"

if(progress<1){

requestAnimationFrame(frame)

}else{

liquid.style.width="28px"
liquid.style.height="28px"

callback()

}

}

requestAnimationFrame(frame)

}

circles.forEach(circle=>{

circle.onclick=()=>{

const active=document.querySelector(".circle.active")

if(active===circle) return

const start=center(active)
const end=center(circle)

liquid.style.opacity=1

active.classList.remove("active")

animate(start,end,()=>{

circle.classList.add("active")
liquid.style.opacity=0

})

}

})

</script>

</body>
</html>
